{% extends "admin/base.html" %}

{% block title %}MindSpace Admin{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">🧠 MindSpace Admin Panel</a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
    rel="stylesheet">
<style>
    :root {
        --bg-dark: #0f172a;
        --surface-dark: #1e293b;
        --surface-light: #334155;
        --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        --accent: #06b6d4;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: rgba(255, 255, 255, 0.08);
        --glass-bg: rgba(30, 41, 59, 0.7);
        --glass-border: rgba(255, 255, 255, 0.1);
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
    }

    /* Header & Branding */
    #header {
        background: var(--glass-bg) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        border-bottom: 1px solid var(--glass-border) !important;
        color: var(--text-main) !important;
        padding: 1.25rem 2.5rem !important;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    #branding h1 {
        font-family: 'Outfit', sans-serif;
        font-weight: 800 !important;
        letter-spacing: -0.025em;
        margin: 0 !important;
        font-size: 1.6rem !important;
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    #header a:link,
    #header a:visited {
        color: var(--text-main);
    }

    #user-tools {
        color: var(--text-muted) !important;
        font-weight: 500 !important;
        font-size: 0.9rem;
    }

    #user-tools a {
        color: var(--text-main) !important;
        font-weight: 600 !important;
        background: rgba(255, 255, 255, 0.05);
        padding: 6px 12px;
        border-radius: 8px;
        transition: all 0.2s;
    }

    #user-tools a:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--accent) !important;
    }

    /* Breadcrumbs */
    .breadcrumbs {
        background: transparent !important;
        border-bottom: 1px solid var(--border-color) !important;
        padding: 1rem 2.5rem !important;
        color: var(--text-muted) !important;
        font-size: 0.875rem;
    }

    .breadcrumbs a {
        color: var(--text-main) !important;
        font-weight: 500 !important;
        opacity: 0.8;
    }

    .breadcrumbs a:hover {
        opacity: 1;
        color: var(--accent) !important;
    }

    /* Buttons */
    .button,
    input[type=submit],
    input[type=button],
    .submit-row input,
    a.button {
        background: var(--primary-gradient) !important;
        border-radius: 10px !important;
        padding: 0.75rem 1.5rem !important;
        font-weight: 700 !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        border: none !important;
        color: white !important;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1) !important;
    }

    .button:hover,
    input[type=submit]:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4) !important;
        filter: brightness(1.1);
    }

    .button.default,
    input[type=submit].default {
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
    }

    /* Tables & Lists */
    .module {
        background: var(--surface-dark) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 16px !important;
        overflow: hidden !important;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important;
        margin-bottom: 2rem !important;
    }

    #changelist {
        background: transparent !important;
        border: none !important;
    }

    #changelist-form {
        border-radius: 16px !important;
        overflow: hidden !important;
        background: var(--surface-dark) !important;
    }

    #result_list {
        width: 100% !important;
        border-collapse: separate;
        border-spacing: 0;
    }

    #result_list thead th {
        background: rgba(255, 255, 255, 0.03) !important;
        color: var(--text-muted) !important;
        font-weight: 600 !important;
        text-transform: uppercase !important;
        font-size: 0.75rem !important;
        letter-spacing: 0.05em;
        padding: 1.25rem !important;
        border-bottom: 1px solid var(--border-color) !important;
    }

    #result_list tbody tr {
        background: transparent !important;
        transition: all 0.2s !important;
    }

    #result_list tbody tr:hover {
        background: rgba(255, 255, 255, 0.04) !important;
    }

    #result_list td,
    #result_list th {
        padding: 1rem 1.25rem !important;
        border-bottom: 1px solid var(--border-color) !important;
        color: var(--text-main) !important;
    }

    /* Filters */
    #changelist-filter {
        background: var(--surface-dark) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 16px !important;
        margin-left: 1.5rem !important;
        padding: 1.5rem !important;
    }

    #changelist-filter h2 {
        background: transparent !important;
        color: var(--text-main) !important;
        font-family: 'Outfit', sans-serif;
        font-weight: 700 !important;
        font-size: 1rem !important;
        padding-bottom: 1rem !important;
        border-bottom: 1px solid var(--border-color) !important;
        margin-bottom: 1rem !important;
    }

    #changelist-filter li a {
        color: var(--text-muted) !important;
        padding: 0.5rem 1rem !important;
        border-radius: 8px !important;
        transition: all 0.2s;
    }

    #changelist-filter li a:hover {
        background: rgba(255, 255, 255, 0.05) !important;
        color: var(--text-main) !important;
    }

    #changelist-filter li.selected a {
        background: var(--primary-gradient) !important;
        color: white !important;
        font-weight: 600 !important;
    }

    /* Forms */
    .module h2 {
        background: rgba(255, 255, 255, 0.03) !important;
        color: var(--text-main) !important;
        font-family: 'Outfit', sans-serif;
        font-weight: 700 !important;
        padding: 1.25rem 2rem !important;
    }

    .form-row {
        border-bottom: 1px solid var(--border-color) !important;
        padding: 1.5rem 2rem !important;
    }

    .form-row label {
        color: var(--text-muted) !important;
        font-weight: 500 !important;
    }

    input[type=text],
    input[type=password],
    input[type=email],
    input[type=url],
    input[type=number],
    textarea,
    select {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1.5px solid var(--border-color) !important;
        border-radius: 10px !important;
        padding: 0.75rem 1rem !important;
        color: var(--text-main) !important;
        transition: all 0.3s !important;
    }

    input:focus,
    textarea:focus,
    select:focus {
        background: rgba(255, 255, 255, 0.08) !important;
        border-color: #6366f1 !important;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15) !important;
        outline: none !important;
    }

    .submit-row {
        background: var(--surface-dark) !important;
        border-top: 1px solid var(--border-color) !important;
        padding: 1.5rem 2rem !important;
        margin-top: 1rem;
    }

    #footer {
        background: transparent !important;
        border-top: 1px solid var(--border-color) !important;
        margin-top: 4rem !important;
        padding: 3rem !important;
        color: var(--text-muted) !important;
        text-align: center !important;
        font-size: 0.875rem;
    }

    /* Dashboard items on main index */
    .dashboard .module table th,
    .dashboard .module table td {
        background: transparent !important;
    }

    a:link,
    a:visited {
        color: var(--accent);
        text-decoration: none;
        transition: color 0.2s;
    }

    a:hover {
        color: #22d3ee;
    }
</style>
{% endblock %}

{% block footer %}
<div id="footer">MindSpace – Student Mental Health Platform 2025-26</div>
{% endblock %}
